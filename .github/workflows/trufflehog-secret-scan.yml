name: TruffleHog Secret Scan

# Scans the repository for leaked secrets, API keys, tokens, etc.
# using TruffleHog OSS.
#
# Uses --no-fail to not break the build (results are reported as warnings).
# To fail on verified secrets, remove --no-fail from extra_args.

on:
  push:
    branches: [main, master]
    paths-ignore:
      - "**.md"
      - "docs/**"
  pull_request:
    paths-ignore:
      - "**.md"
      - "docs/**"
  workflow_dispatch:
  schedule:
    # Run weekly on Monday at 03:00 UTC
    - cron: "0 3 * * 1"

permissions:
  contents: read

concurrency:
  group: trufflehog-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  trufflehog:
    name: TruffleHog Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --results=verified,unknown --no-fail
